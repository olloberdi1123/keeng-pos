
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS SUPER PULT | Keeng Market</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.update();
                }).catch(err => console.log('SW Xato:', err));
            });
        }
    </script>

    <style>
        :root { 
            --primary: #0ea5e9; 
            --primary-glow: rgba(14, 165, 233, 0.4);
            --bg-main: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; outline: none; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617); 
            color: var(--text-main); 
            padding-bottom: 50px; 
            min-height: 100vh;
        }
        
        /* HEADER & STATS */
        .header { 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-top h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; color: #fff; text-shadow: 0 0 10px var(--primary-glow); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            padding: 15px 10px; 
            border-radius: 16px; 
            border: 1px solid var(--card-border);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .stat-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--primary); }
        .stat-box:nth-child(2)::before { background: var(--green); }
        .stat-box:nth-child(3)::before { background: var(--red); }
        
        .stat-val { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        .stat-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        .container { padding: 20px; max-width: 900px; margin: 0 auto; }
        
        /* GLASS CARDS */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .card-title { font-size: 16px; font-weight: 900; color: #fff; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* FORMS & BUTTONS */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            font-size: 15px; 
            background: rgba(0,0,0,0.2); 
            color: white;
            transition: 0.3s; 
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); background: rgba(0,0,0,0.4); }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; font-size: 14px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { transform: scale(0.96); }
        .btn-blue { background: linear-gradient(135deg, #0284c7, #2563eb); box-shadow: 0 4px 15px rgba(14,165,233,0.3); } 
        .btn-green { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 15px rgba(16,185,129,0.3); } 
        .btn-red { background: linear-gradient(135deg, #dc2626, #ef4444); box-shadow: 0 4px 15px rgba(239,68,68,0.3); } 
        .btn-outline { background: transparent; border: 1px solid var(--card-border); color: var(--text-main); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* SHOP LIST */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box i { position: absolute; left: 15px; top: 16px; color: var(--text-muted); font-size: 16px; }
        .search-box input { padding-left: 45px; margin-bottom: 0; border-radius: 14px; background: rgba(0,0,0,0.4); font-size: 16px; border: 1px solid var(--primary); }
        
        .shop-list { display: flex; flex-direction: column; gap: 12px; max-height: 65vh; overflow-y: auto; padding-right: 5px; }
        .shop-list::-webkit-scrollbar { width: 5px; } 
        .shop-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .shop-item { 
            background: linear-gradient(145deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9)); 
            border: 1px solid var(--card-border); 
            border-radius: 16px; 
            padding: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
            overflow: hidden; 
        }
        .shop-item:hover { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); transform: translateY(-2px); }
        .shop-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--green); }
        .shop-item.blocked::before { background: var(--red); }
        
        .shop-info h4 { margin: 0 0 5px 0; font-size: 16px; color: #fff; font-weight: 900; letter-spacing: 0.5px; }
        .shop-info p { margin: 0; font-size: 13px; color: var(--primary); font-weight: bold; }
        .shop-meta { text-align: right; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; color: white; display: inline-block; vertical-align: middle; margin-left: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bg-premium { background: linear-gradient(135deg, #f59e0b, #d97706); } 
        .bg-standart { background: linear-gradient(135deg, #0ea5e9, #0284c7); } 
        .bg-mini { background: linear-gradient(135deg, #64748b, #475569); }
        
        .status-badge { font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 8px; display:inline-block; }
        .status-faol { background: rgba(16, 185, 129, 0.2); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-blok { background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        /* MODALLAR */
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); padding: 15px; }
        .modal-content { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            width: 100%; 
            max-width: 500px; 
            max-height: 90vh; 
            border-radius: 24px; 
            padding: 25px 20px; 
            overflow-y: auto; 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        
        .close-modal { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-modal:hover { background: var(--red); border-color: var(--red); }
        
        .addon-box { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; }
        .addon-box select { margin-bottom: 0; padding: 10px; background: rgba(255,255,255,0.05); border:none;}
        option { background: #1e293b; color: white; }

        /* CONFIRM BOX */
        .custom-alert-box { text-align: center; } 
        .custom-alert-icon { font-size: 50px; color: var(--orange); margin-bottom: 15px; } 
        .custom-alert-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; line-height: 1.4; color:white; } 
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1><i class="fas fa-satellite-dish" style="color:var(--primary);"></i> SUPER PULT</h1>
            <span style="background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:10px; font-size:11px; font-weight:900; letter-spacing:1px; border:1px solid rgba(255,255,255,0.05);">ADMIN</span>
        </div>
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-title">Do'konlar</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-active" style="color:var(--green);">0</div><div class="stat-title">Aktiv</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-blocked" style="color:var(--red);">0</div><div class="stat-title">Bloklangan</div></div>
        </div>
    </div>

    <div class="container">

        <div class="card" style="border-left: 4px solid var(--orange);">
            <h3 class="card-title"><i class="fas fa-broadcast-tower" style="color:var(--orange);"></i> Barchaga E'lon (Push)</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="xabar-matni" placeholder="Xabar yozing (Dastur yangilandi...)" style="margin-bottom:0;">
                <button class="btn btn-blue" style="width:auto; margin-bottom:0; padding:0 20px;" onclick="yuborish()"><i class="fas fa-paper-plane"></i></button>
                <button class="btn btn-red" style="width:auto; margin-bottom:0; padding:0 20px;" onclick="ochirish()"><i class="fas fa-trash"></i></button>
            </div>
        </div>

        <div class="card" style="background:transparent; border:none; padding:0; box-shadow:none;">
            <h3 class="card-title" style="font-size:18px; border:none; margin-bottom:10px;"><i class="fas fa-users-cog" style="color:var(--primary);"></i> Mijozlar Bazasi</h3>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Do'kon nomi yoki raqamini qidiring..." onkeyup="filterShops()">
            </div>

            <div class="shop-list" id="shops-list-container">
                <div style="text-align:center; padding:50px 20px; color:var(--text-muted);">
                    <i class="fas fa-circle-notch fa-spin" style="font-size:40px; margin-bottom:15px; color:var(--primary);"></i><br>
                    <b style="font-size:14px; letter-spacing:1px;">BAZA YUKLANMOQDA...</b>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top:20px; border-top: 1px solid var(--primary);">
            <h3 class="card-title"><i class="fas fa-wallet" style="color:var(--primary);"></i> To'lov Sozlamalari (Mijozlar uchun)</h3>
            <div class="grid-2">
                <div class="input-group"><label>Karta Raqami</label><input type="text" id="admin-card-num" placeholder="8600 1234 5678 9012"></div>
                <div class="input-group"><label>Karta Egasi</label><input type="text" id="admin-card-name" placeholder="Ism Familiya"></div>
            </div>
            <div class="input-group"><label>Bog'lanish uchun raqamingiz</label><input type="text" id="admin-phone-num" placeholder="+998 90 123 45 67"></div>
            <button class="btn btn-dark" style="margin-top:15px; margin-bottom:0;" onclick="saveAdminSettings()"><i class="fas fa-save"></i> SAQLASH</button>
        </div>

    </div>

    <div class="modal" id="editor-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditor()"><i class="fas fa-times"></i></button>
            
            <div style="text-align:center; margin-bottom:20px; margin-top:10px;">
                <div style="width:70px; height:70px; background:linear-gradient(135deg, rgba(14,165,233,0.2), rgba(37,99,235,0.2)); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px auto; border:2px solid var(--primary); box-shadow:0 0 20px var(--primary-glow);">
                    <i class="fas fa-store" style="font-size:28px; color:var(--primary);"></i>
                </div>
                <h2 id="edit-shop-name" style="margin:0; font-size:22px; font-weight:900; letter-spacing:0.5px;">Do'kon Nomi</h2>
                <div style="color:var(--primary); font-weight:bold; margin-top:5px; font-size:15px; letter-spacing:1px;" id="edit-shop-phone">90 123 45 67</div>
                <div style="color:var(--text-muted); font-size:12px; margin-top:10px; background:rgba(0,0,0,0.3); display:inline-block; padding:4px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">Parol: <b id="edit-shop-pass" style="color:#fff;">***</b></div>
            </div>

            <div class="input-group">
                <label>Dastur Ruxsati (Bloklash)</label>
                <select id="edit-shop-status" style="font-weight:900; font-size:15px;">
                    <option value="faol">🟢 FAOL (Dasturga kiradi)</option>
                    <option value="bloklangan">🔴 BLOKLANGAN (To'lov so'raydi)</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Oylik Tarif</label>
                    <select id="edit-shop-tarif" style="font-weight:bold; color:var(--primary);">
                        <option value="mini">Mini (70k)</option>
                        <option value="standart">Standart (90k)</option>
                        <option value="premium">Premium (140k)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Muddat Tugash Sanasi</label>
                    <input type="date" id="edit-shop-expire" style="font-weight:bold; color:var(--orange);">
                </div>
            </div>
            
            <button class="btn btn-green" style="margin-bottom:20px;" onclick="add30Days()"><i class="fas fa-calendar-plus"></i> AVTOMAT +30 KUN QO'SHISH</button>
            
            <div class="grid-2">
                <div class="addon-box">
                    <i class="fas fa-users" style="color:var(--orange); font-size:24px; margin-bottom:10px;"></i>
                    <div style="font-size:12px; font-weight:900; margin-bottom:5px; color:var(--text-muted);">Klient Moduli</div>
                    <select id="edit-modul-klient" style="font-weight:bold;">
                        <option value="false">🔒 Yopiq</option>
                        <option value="true">✅ Ochiq</option>
                    </select>
                </div>
                <div class="addon-box">
                    <i class="fas fa-stopwatch" style="color:var(--primary); font-size:24px; margin-bottom:10px;"></i>
                    <div style="font-size:12px; font-weight:900; margin-bottom:5px; color:var(--text-muted);">Arenda Moduli</div>
                    <select id="edit-modul-arenda" style="font-weight:bold;">
                        <option value="false">🔒 Yopiq</option>
                        <option value="true">✅ Ochiq</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-top:15px; background:rgba(16,185,129,0.1); padding:15px; border-radius:12px; border:1px solid rgba(16,185,129,0.2);">
                <label style="color:var(--green); font-size:13px;"><i class="fas fa-gift"></i> Shaxsiy Chegirma (so'm)</label>
                <input type="number" id="edit-shop-skidka" placeholder="Masalan: 10000" style="margin-bottom:0; background:rgba(0,0,0,0.3); border-color:var(--green); color:var(--green); font-weight:bold; font-size:16px;">
            </div>

            <button class="btn btn-blue" style="margin-top:20px; font-size:15px; padding:16px;" onclick="saveShopSettings(this)"><i class="fas fa-save"></i> O'ZGARISHLARNI SAQLASH</button>
            <button class="btn btn-outline" style="color:var(--red); border-color:var(--red); margin-bottom:0; margin-top:10px;" onclick="requestDeleteShop()"><i class="fas fa-trash-alt"></i> DO'KONNI BUTUNLAY O'CHIRISH</button>
        </div>
    </div>

    <div id="custom-confirm" class="modal">
        <div class="modal-content custom-alert-box" style="max-width:350px; padding:30px 20px;">
            <div class="custom-alert-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div id="custom-confirm-msg" class="custom-alert-title">Do'konni o'chirib yuborasizmi? Barcha ma'lumotlar yo'qoladi!</div>
            <input type="password" id="delete-pin" placeholder="PIN kod (1234)" style="text-align:center; font-size:20px; letter-spacing:5px;">
            <div class="grid-2" style="margin-top:15px;">
                <button class="btn btn-red" onclick="executeDelete()">O'CHIRISH</button>
                <button class="btn btn-outline" onclick="closeModal('custom-confirm')">BEKOR</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE ULASH
        const firebaseConfig = { apiKey: "AIzaSyA8F47YRcEPTIwyI7AjSeqXIyddFpz8orU", authDomain: "keeng-market.firebaseapp.com", databaseURL: "https://keeng-market-default-rtdb.firebaseio.com", projectId: "keeng-market", storageBucket: "keeng-market.firebasestorage.app", messagingSenderId: "688523074873", appId: "1:688523074873:web:016b69f98a238bd19d5ce8" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let shopsData = {}; 
        let currentEditingPhone = null;

        window.onload = () => {
            // ADMIN TO'LOV MA'LUMOTLARI
            db.ref("saas_global/admin_pay_settings").once("value", snap => {
                if(snap.exists()) {
                    let s = snap.val(); 
                    document.getElementById('admin-card-num').value = s.card_number || ""; 
                    document.getElementById('admin-card-name').value = s.card_name || ""; 
                    document.getElementById('admin-click-merchant').value = s.click_merchant || ""; 
                    document.getElementById('admin-click-service').value = s.click_service || "";
                    document.getElementById('admin-phone-num').value = s.admin_phone || "+998 93 453 11 23";
                }
            });

            // DO'KONLARNI JONLI KUZATISH
            db.ref("saas_dokonlar").on("value", snap => {
                if(!snap.exists()) { 
                    document.getElementById('shops-list-container').innerHTML = "<div style='text-align:center; padding:30px; font-weight:bold; color:var(--text-muted);'>Hali hech qanday do'kon yo'q!</div>"; 
                    updateStats(0,0,0); return; 
                }
                shopsData = snap.val();
                renderShopsList();
            }, error => {
                alert("Xatolik! Baza bilan bog'lanib bo'lmadi: " + error.message);
            });
        };

        function updateStats(total, active, blocked) {
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-blocked').innerText = blocked;
        }

        function renderShopsList(searchQuery = "") {
            const container = document.getElementById('shops-list-container');
            let html = '';
            let t = 0, a = 0, b = 0;

            let sortedPhones = Object.keys(shopsData).sort((x, y) => {
                let dx = shopsData[x].sozlamalar?.ro_yxatdan_sana || "";
                let dy = shopsData[y].sozlamalar?.ro_yxatdan_sana || "";
                return dy.localeCompare(dx); 
            });

            sortedPhones.forEach(phone => {
                let shop = shopsData[phone];
                if(!shop || !shop.sozlamalar) return;
                let d = shop.sozlamalar;
                
                let name = d.dokon_nomi || "Nomsiz";
                let tarif = d.tarif || "mini";
                let isBlocked = (d.status === 'bloklangan');
                let expDate = d.obuna_tugash_sanasi || "";

                if(searchQuery) {
                    let textToSearch = (name + " " + phone).toLowerCase();
                    if(!textToSearch.includes(searchQuery.toLowerCase())) return;
                }

                t++;
                if(isBlocked) b++; else a++;

                let badgeClass = tarif === 'premium' ? 'bg-premium' : (tarif === 'standart' ? 'bg-standart' : 'bg-mini');
                let statusHtml = isBlocked ? `<span class="status-badge status-blok"><i class="fas fa-lock"></i> Bloklangan</span>` : `<span class="status-badge status-faol"><i class="fas fa-check-circle"></i> Faol</span>`;
                let classBlocked = isBlocked ? "blocked" : "";
                
                let daysHtml = "";
                if (expDate) {
                    let exp = new Date(expDate); let today = new Date();
                    let diffDays = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
                    if (diffDays < 0) daysHtml = `<b style="color:var(--red); font-size:15px;">Tugagan!</b>`;
                    else if (diffDays <= 3) daysHtml = `<b style="color:var(--orange); font-size:16px;">${diffDays}</b> <small style="color:var(--text-muted)">kun qoldi</small>`;
                    else daysHtml = `<b style="color:var(--green); font-size:16px;">${diffDays}</b> <small style="color:var(--text-muted)">kun qoldi</small>`;
                }

                let iconsHtml = "";
                if (d.klient_yoqilgan) iconsHtml += `<i class="fas fa-users" style="color:var(--orange); font-size:12px; margin-left:8px;" title="Klient moduli"></i>`;
                if (d.arenda_yoqilgan) iconsHtml += `<i class="fas fa-stopwatch" style="color:var(--primary); font-size:12px; margin-left:8px;" title="Arenda moduli"></i>`;

                html += `
                <div class="shop-item ${classBlocked}" onclick="openEditor('${phone}')">
                    <div class="shop-info">
                        <h4>${name} <span class="badge ${badgeClass}">${tarif.toUpperCase()}</span> ${iconsHtml}</h4>
                        <p><i class="fas fa-phone-alt" style="font-size:11px; margin-right:3px;"></i> ${phone}</p>
                    </div>
                    <div class="shop-meta">
                        ${statusHtml}<br>
                        <div style="margin-top:8px;">${daysHtml}</div>
                    </div>
                </div>`;
            });

            if(!html) html = `<div style="text-align:center; padding:30px 20px; color:var(--text-muted); font-weight:bold;"><i class="fas fa-search" style="font-size:30px; margin-bottom:10px; opacity:0.5;"></i><br>Bunday do'kon topilmadi.</div>`;
            container.innerHTML = html;
            updateStats(t, a, b);
        }

        function filterShops() {
            let q = document.getElementById('search-input').value;
            renderShopsList(q);
        }

        function saveAdminSettings() { 
            let adminBtn = event.currentTarget;
            let origText = adminBtn.innerHTML;
            adminBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Saqlanmoqda...';

            db.ref("saas_global/admin_pay_settings").update({ 
                card_number: document.getElementById('admin-card-num').value.trim(), 
                card_name: document.getElementById('admin-card-name').value.trim(), 
                click_merchant: document.getElementById('admin-click-merchant').value.trim(), 
                click_service: document.getElementById('admin-click-service').value.trim(),
                admin_phone: document.getElementById('admin-phone-num').value.trim() || "+998 93 453 11 23"
            }).then(() => {
                setTimeout(() => {
                    adminBtn.innerHTML = '<i class="fas fa-check"></i> Saqlandi!';
                    adminBtn.classList.replace('btn-dark', 'btn-green');
                    setTimeout(() => { adminBtn.innerHTML = origText; adminBtn.classList.replace('btn-green', 'btn-dark'); }, 2000);
                }, 500);
            }).catch(e => {
                alert("Xato: " + e.message);
                adminBtn.innerHTML = origText;
            }); 
        }

        function yuborish() { 
            let txt = document.getElementById('xabar-matni').value; 
            if(!txt) return alert("Matnni yozmasdan turib yuborib bo'lmaydi!"); 
            db.ref("saas_global/banner").set({ active: true, text: txt }); 
            alert("E'lon barcha mijozlarning dasturida qizil fonda chiqdi!"); 
        }
        function ochirish() { 
            db.ref("saas_global/banner").set({ active: false, text: "" }); 
            document.getElementById('xabar-matni').value = ""; 
            alert("Banner barcha dasturlardan o'chirildi!"); 
        }

        // EDITOR MODAL LOGIC
        function openEditor(phone) {
            currentEditingPhone = phone;
            let d = shopsData[phone].sozlamalar;
            
            document.getElementById('edit-shop-name').innerText = d.dokon_nomi || "Nomsiz do'kon";
            document.getElementById('edit-shop-phone').innerText = phone;
            document.getElementById('edit-shop-pass').innerText = d.parol || "***";
            
            document.getElementById('edit-shop-status').value = d.status || "faol";
            document.getElementById('edit-shop-tarif').value = d.tarif || "mini";
            document.getElementById('edit-shop-expire').value = d.obuna_tugash_sanasi || "";
            
            document.getElementById('edit-modul-klient').value = (d.klient_yoqilgan === true) ? "true" : "false";
            document.getElementById('edit-modul-arenda').value = (d.arenda_yoqilgan === true) ? "true" : "false";
            document.getElementById('edit-shop-skidka').value = d.skidka || 0;

            document.getElementById('editor-modal').style.display = 'flex';
        }

        function closeEditor() {
            document.getElementById('editor-modal').style.display = 'none';
            currentEditingPhone = null;
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function add30Days() {
            let currentExp = document.getElementById('edit-shop-expire').value;
            let exp = currentExp ? new Date(currentExp) : new Date(); 
            let today = new Date();
            if (exp < today) exp = today; 
            exp.setDate(exp.getDate() + 30);
            document.getElementById('edit-shop-expire').value = exp.toISOString().split('T')[0];
            document.getElementById('edit-shop-status').value = "faol"; 
        }

        function saveShopSettings(btn) {
            if(!currentEditingPhone) return;
            
            let origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> SAQLANMOQDA...';

            let d = {
                status: document.getElementById('edit-shop-status').value,
                tarif: document.getElementById('edit-shop-tarif').value,
                obuna_tugash_sanasi: document.getElementById('edit-shop-expire').value,
                klient_yoqilgan: document.getElementById('edit-modul-klient').value === "true",
                arenda_yoqilgan: document.getElementById('edit-modul-arenda').value === "true",
                skidka: parseInt(document.getElementById('edit-shop-skidka').value) || 0
            };
            
            db.ref("saas_dokonlar/" + currentEditingPhone + "/sozlamalar").update(d).then(() => { 
                setTimeout(() => {
                    closeEditor();
                    btn.innerHTML = origText;
                }, 300);
            }).catch(e => {
                alert("Xato yuz berdi: " + e);
                btn.innerHTML = origText;
            });
        }

        // O'CHIRISH FUNKSIYASI (PIN KOD BILAN)
        function requestDeleteShop() {
            document.getElementById('delete-pin').value = '';
            document.getElementById('custom-confirm').style.display = 'flex';
        }

        function executeDelete() {
            let pin = document.getElementById('delete-pin').value;
            if (pin === "1234") {
                db.ref("saas_dokonlar/" + currentEditingPhone).remove().then(() => {
                    closeModal('custom-confirm');
                    closeEditor();
                });
            } else {
                alert("PIN kod xato!");
            }
        }
    </script>
</body>
</html>
